name: HR Service CI Pipeline

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    permissions:
      contents: read
      packages: write
      security-events: write
      pull-requests: write
    uses: OrganiStation-org/shared-workflows/.github/workflows/reusable-ci.yaml@main
    with:
      image_name: hr
      sonar_project_key: organistation-hr
      sonar_org: "organistation-org"
      language: "python"
    secrets: inherit
