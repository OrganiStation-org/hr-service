name: hr
replicaCount: 1
rollingUpdate:
  type: RollingUpdate
  maxUnavailable: 25%
  maxSurge: 25%
image:
  name: maheshnandi/organistation-hr
  tag: v1.0.0
  pullPolicy: IfNotPresent
service:
  port: 8002
  targetPort: 8002
  healthPath: /api/health
resources:
  limits:
    cpu: 300m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi
